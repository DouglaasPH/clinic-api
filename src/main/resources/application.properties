spring.application.name=clinic-api
spring.jpa.open-in-view=true

# DATASOURCE
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?options=-c%20timezone=America/Recife
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA, SQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# SECURITY
clinic.jwt.secret=${JWT_SECRET_KEY}

# OAUTH2
# Google configuration
spring.security.oauth2.client.registration.google.client-id=${OAUTH2_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH2_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://localhost:8080/oauth2
google.client.id=${OAUTH2_GOOGLE_CLIENT_ID}